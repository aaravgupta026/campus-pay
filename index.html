<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campus Pay V5</title>
    <meta name="theme-color" content="#121212">
    <link rel="icon" type="image/svg+xml" href="assets/campus-pay-brand.svg">
    <link rel="shortcut icon" href="assets/campus-pay-brand.svg">
    <link rel="apple-touch-icon" href="assets/campus-pay-brand.svg">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="brand-row">
        <img src="assets/campus-pay-brand.svg" alt="Campus Pay Logo" class="brand-logo">
        <h1>Campus Pay</h1>
    </div>
    <div class="subtitle">Smart Suggestions & Dynamic IDs</div>

    <div class="auth-card">
        <div id="loggedOutView">
            <div class="auth-title">Sync with your Google account</div>
            <button id="googleLoginBtn" class="action-btn">Sign in with Google</button>
        </div>
        <div id="loggedInView" style="display:none;">
            <div class="auth-title">Signed in</div>
            <div class="auth-user"><strong id="userName">User</strong></div>
            <div class="auth-user" id="userEmail">-</div>
            <div class="auth-user auth-uid">UID: <span id="userUid">-</span></div>
            <button class="clear-btn" onclick="signOutUser()">Sign out</button>
        </div>
        <div id="authHint" class="auth-hint"></div>
    </div>

    <div class="dashboard">
        <div>
            <div class="stat-label">Total Spent Overall</div>
            <div class="stat-value" id="totalSpent">₹0</div>
        </div>
        <div class="dashboard-actions">
            <button class="action-btn" onclick="exportExpensesCSV()">Export</button>
            <button class="action-btn" onclick="shareExpensesReport()">Share</button>
            <button class="clear-btn" onclick="clearHistory()">Reset All</button>
        </div>
    </div>

    <div class="analytics-card">
        <div class="analytics-row">
            <label for="monthSelect" class="stat-label">Month</label>
            <select id="monthSelect" class="month-select"></select>
        </div>
        <div class="analytics-grid">
            <div class="analytics-item">
                <div class="stat-label">Selected Month</div>
                <div class="stat-value" id="monthSpent">₹0</div>
            </div>
            <div class="analytics-item">
                <div class="stat-label">Current Year</div>
                <div class="stat-value" id="yearSpent">₹0</div>
            </div>
        </div>
    </div>

    <div id="shopsContainer"></div>
    
    <button class="add-shop-btn" onclick="openScanner('NEW_SHOP')">➕ Add New Shop</button>

    <div class="history-list">
        <div style="color: #03dac6; margin-bottom: 8px; font-weight: bold; font-size: 14px;">Recent Spends</div>
        <div id="historyContainer"></div>
    </div>

    <div id="scanner-modal">
        <h3 id="scanner-title" style="color: white; margin-bottom: 20px;">Scan QR Code</h3>
        <div id="reader"></div>
        <button class="close-scanner" onclick="closeScanner()">Cancel</button>
    </div>

    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
